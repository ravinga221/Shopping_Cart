<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Buy Fresh Goods</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#166534',
                        secondary: '#84CC16',
                        neutralBg: '#F3F4F6',
                        neutralTextMain: '#1F2937',
                        neutralTextMuted: '#6B7280',
                        neutralCard: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-neutralBg text-neutralTextMain min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-primary text-white sticky top-0 z-40 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wide">FreshMart</a>
            <div class="flex items-center space-x-4">
                <a href="cart.html" class="relative group p-2 hover:bg-blue-800 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span id="cartCount" class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-secondary rounded-full hidden shadow animate-bounce">0</span>
                </a>
                <a href="admin.html" class="text-sm border border-white px-3 py-1 rounded hover:bg-blue-800 transition">Admin</a>
                <a href="admin.html" id="adminLink" class="hidden text-secondary font-bold hover:underline mr-2">Admin</a>
                <button id="loginBtn" class="border flex items-center border-secondary text-secondary hover:bg-secondary hover:text-white transition-colors duration-300 font-semibold py-2 px-4 rounded shadow">
                    Login
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 animate-fade-in">
        <!-- Category Filter -->
        <div class="mb-8">
            <h2 class="text-xl font-bold mb-4 text-primary">Categories</h2>
            <div id="categoryList" class="flex space-x-4 overflow-x-auto hide-scrollbar pb-2">
                <!-- Categories injected here -->
            </div>
        </div>

        <!-- Product Grid -->
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Products injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary text-white mt-auto py-6">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 FreshMart. All rights reserved.</p>
        </div>
    </footer>


    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentCategoryId = 'all';

            function renderCategories() {
                const categories = getCategories();
                const container = document.getElementById('categoryList');
                container.innerHTML = `
                    <button class="category-btn px-4 py-2 whitespace-nowrap font-medium text-sm transition-colors border-b-2 ${currentCategoryId === 'all' ? 'border-primary text-primary' : 'border-transparent text-neutralTextMuted hover:text-primary'}"" data-id="all">
                        All
                    </button>
                `;
                
                categories.forEach(cat => {
                    const isActive = currentCategoryId === cat.id;
                    const btn = document.createElement('button');
                    btn.className = `category-btn px-4 py-2 whitespace-nowrap font-medium text-sm transition-colors border-b-2 ${isActive ? 'border-primary text-primary' : 'border-transparent text-neutralTextMuted hover:text-primary'}`;
                    btn.dataset.id = cat.id;
                    btn.textContent = cat.name;
                    container.appendChild(btn);
                });

                document.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        currentCategoryId = e.target.dataset.id;
                        renderCategories();
                        renderProducts();
                    });
                });
            }

            function renderProducts() {
                const products = getProducts();
                const container = document.getElementById('productGrid');
                container.innerHTML = '';
                
                const filtered = currentCategoryId === 'all' 
                    ? products 
                    : products.filter(p => p.categoryId === currentCategoryId);

                if (filtered.length === 0) {
                    container.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No products found in this category.</p>';
                    return;
                }

                filtered.forEach((product, index) => {
                    const card = document.createElement('div');
                    const staggerClass = index < 4 ? `stagger-${index + 1}` : '';
                    card.className = `bg-neutralCard border border-gray-100 rounded-xl shadow-sm hover:shadow-lg transition-all transform hover:-translate-y-1 overflow-hidden flex flex-col animate-scale-in ${staggerClass}`;
                    card.innerHTML = `
                        <img src="${product.imageUrl}" alt="${product.name}" class="w-full h-48 object-cover">
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold text-gray-800">${product.name}</h3>
                            <p class="text-sm text-neutralTextMuted line-clamp-2 mt-1 flex-grow">${product.description}</p>
                            <div class="mt-4 flex items-center justify-between">
                                <span class="text-xl font-bold text-primary">LKR ${parseFloat(product.price).toFixed(2)}</span>
                                <button onclick="handleAddToCart('${product.id}')" class="bg-secondary text-white px-4 py-2 rounded-lg font-semibold hover:bg-yellow-600 transition-colors shadow flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                                    Add
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            // Expose handleAddToCart to global scope so inline onclick can see it
            window.handleAddToCart = function(id) {
                addToCart(id, 1);
                
                // Show a tiny toast using standard alert for now
                const product = getProducts().find(p => p.id === id);
                if (product) {
                    // Flash badge animation
                    const badge = document.getElementById('cartCount');
                    badge.classList.remove('animate-bounce');
                    void badge.offsetWidth; // trigger reflow
                    badge.classList.add('animate-bounce');
                }
            };

            renderCategories();
            renderProducts();
        });
    </script>
</body>
</html>
