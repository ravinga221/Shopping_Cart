<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FreshMart</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#166534',
                        secondary: '#84CC16',
                        neutralBg: '#F3F4F6',
                        neutralTextMain: '#1F2937',
                        neutralTextMuted: '#6B7280',
                        neutralCard: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutralBg text-neutralTextMain min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-primary text-white sticky top-0 z-40 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wide">FreshMart</a>
            <!-- Simplified header for checkout -->
            <a href="cart.html" class="text-sm font-semibold hover:underline text-white transition">Back to Cart</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="bg-neutralCard max-w-lg w-full rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-primary p-6 text-center">
                <h1 class="text-3xl font-bold text-white">Order Summary</h1>
                <p class="text-blue-200 mt-2 text-sm">Review your items before proceeding</p>
            </div>
            
            <div class="p-8">
                <div id="checkoutSummaryList" class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2 divide-y divide-gray-100">
                    <!-- Rendered Items -->
                </div>

                <div class="border-t border-gray-200 pt-6 flex justify-between items-center mb-8">
                    <span class="text-gray-600 font-semibold">Total Amount</span>
                    <span id="checkoutTotalAmount" class="text-3xl font-bold text-primary">$0.00</span>
                </div>

                <div class="bg-yellow-50 border border-secondary text-yellow-800 rounded-lg p-4 mb-8 flex items-start space-x-3 shadow-sm">
                    <svg class="w-6 h-6 text-secondary flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p class="text-sm">Payment gateway integration is a future enhancement. This is a simulation indicating a successful cart flow.</p>
                </div>

                <a href="index.html" class="block w-full text-center bg-primary text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition shadow">
                    Back to Home
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary text-white mt-auto py-6">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 FreshMart. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('checkoutSummaryList');
            const totalEl = document.getElementById('checkoutTotalAmount');
            const cartItems = getCart();
            const products = getProducts();

            if (cartItems.length === 0) {
                listEl.innerHTML = '<p class="text-center text-gray-500 py-4">Your cart is empty.</p>';
            } else {
                cartItems.forEach(item => {
                    const product = products.find(p => p.id === item.productId);
                    if (product) {
                        const div = document.createElement('div');
                        div.className = 'flex justify-between items-center pt-4 first:pt-0';
                        const itemTotal = (product.price * item.quantity).toFixed(2);
                        div.innerHTML = `
                            <div class="flex items-center space-x-4">
                                <img src="${product.imageUrl}" class="w-12 h-12 rounded object-cover shadow-sm">
                                <div>
                                    <h4 class="font-bold text-gray-800 text-sm">${product.name}</h4>
                                    <p class="text-xs text-gray-500">Qty: ${item.quantity}</p>
                                </div>
                            </div>
                            <span class="font-semibold text-gray-700">$${itemTotal}</span>
                        `;
                        listEl.appendChild(div);
                    }
                });
            }

            totalEl.textContent = `$${getCartTotal().toFixed(2)}`;
            
            // Clear cart after reaching checkout for demo purposes
            saveCart([]);
        });
    </script>
</body>
</html>
