<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FreshMart</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#166534',
                        secondary: '#84CC16',
                        neutralBg: '#F3F4F6',
                        neutralTextMain: '#1F2937',
                        neutralTextMuted: '#6B7280',
                        neutralCard: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-neutralBg text-neutralTextMain min-h-screen flex flex-col">

    <!-- Auth check script before rendering content to prevent flashing -->
    <script src="js/auth.js"></script>
    <script>
        if (!Auth.isAdmin()) {
            alert('Unauthorized Access. Admins only.');
            window.location.href = 'login.html';
        }
    </script>

    <!-- Header -->
    <header class="bg-primary text-white sticky top-0 z-40 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wide">FreshMart</a>
            <div class="flex items-center space-x-4">
                <span class="font-bold text-secondary mr-4">Admin Mode</span>
                <a href="cart.html" class="relative group p-2 hover:bg-blue-800 rounded-full transition-colors hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span id="cartCount" class="absolute top-0 right-0 hidden">0</span>
                </a>
                <button id="loginBtn" class="border flex items-center border-secondary text-secondary hover:bg-secondary hover:text-white transition-colors duration-300 font-semibold py-2 px-4 rounded shadow">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 animate-fade-in">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Categories Management -->
            <div class="lg:w-1/3">
                <div class="bg-neutralCard rounded-xl shadow border border-gray-100 p-6 sticky top-24">
                    <h2 class="text-xl font-bold text-primary mb-6">Product Categories</h2>
                    
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="newCategoryName" placeholder="New Category Name" class="flex-grow border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                        <button onclick="addCategory()" class="border border-secondary text-secondary hover:bg-secondary hover:text-white px-4 py-2 rounded text-sm font-semibold transition">Add</button>
                    </div>

                    <ul id="categoryAdminList" class="divide-y divide-gray-200">
                        <!-- Rendered categories -->
                    </ul>
                </div>
            </div>

            <!-- Products Management -->
            <div class="lg:w-2/3">
                <div class="bg-neutralCard rounded-xl shadow border border-gray-100 p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-primary">Products</h2>
                        <button onclick="toggleProductForm()" id="addProductToggleBtn" class="bg-secondary text-white px-4 py-2 rounded font-semibold hover:bg-yellow-600 transition shadow">Add New Product</button>
                    </div>

                    <!-- Product Form -->
                    <div id="productFormContainer" class="hidden mb-8 p-6 bg-gray-50 border rounded flex flex-col gap-4">
                        <input type="hidden" id="productId">
                        <div>
                            <label class="block text-sm text-gray-700 font-bold mb-1">Name</label>
                            <input type="text" id="productName" class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm text-gray-700 font-bold mb-1">Price</label>
                                <input type="number" id="productPrice" step="0.01" class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm text-gray-700 font-bold mb-1">Category</label>
                                <select id="productCategory" class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"></select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700 font-bold mb-1">Image URL</label>
                            <input type="text" id="productImage" placeholder="https://..." class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700 font-bold mb-1">Description</label>
                            <textarea id="productDesc" rows="3" class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                        </div>
                        <div class="flex justify-end gap-2 mt-2">
                            <button onclick="toggleProductForm()" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded text-sm font-semibold transition">Cancel</button>
                            <button onclick="saveProduct()" class="bg-primary text-white px-4 py-2 rounded text-sm font-semibold hover:bg-blue-800 transition">Save Product</button>
                        </div>
                    </div>

                    <!-- Product List -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700 text-sm">
                                    <th class="py-3 px-4 rounded-tl-lg">Image</th>
                                    <th class="py-3 px-4">Details</th>
                                    <th class="py-3 px-4">Price</th>
                                    <th class="py-3 px-4 rounded-tr-lg text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productAdminList" class="divide-y divide-gray-200">
                                <!-- Rendered products -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary text-white mt-auto py-6">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 FreshMart. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup logout for Admin
            const logoutBtn = document.getElementById('loginBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    Auth.logout();
                });
            }
            renderAdminView();
        });

        function renderAdminView() {
            renderAdminCategories();
            renderAdminProducts();
        }

        // --- Category Logic ---
        function renderAdminCategories() {
            const list = document.getElementById('categoryAdminList');
            const catSelect = document.getElementById('productCategory');
            const categories = getCategories();
            
            list.innerHTML = '';
            catSelect.innerHTML = '';

            categories.forEach(cat => {
                // List item
                const li = document.createElement('li');
                li.className = 'py-3 flex justify-between items-center group';
                li.innerHTML = `
                    <span class="font-medium text-gray-800" id="cat-text-${cat.id}">${cat.name}</span>
                    <input type="text" id="cat-edit-${cat.id}" class="hidden border rounded px-2 py-1 text-sm focus:outline-none" value="${cat.name}">
                    <div class="flex space-x-2">
                        <button onclick="editCategory('${cat.id}')" id="cat-edit-btn-${cat.id}" class="text-gray-400 hover:text-blue-500 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button onclick="saveCategoryName('${cat.id}')" id="cat-save-btn-${cat.id}" class="hidden text-green-500 hover:text-green-700 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        <button onclick="deleteCategory('${cat.id}')" class="text-gray-400 hover:text-red-500 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                list.appendChild(li);

                // Populate Form Select
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.textContent = cat.name;
                catSelect.appendChild(opt);
            });
        }

        window.addCategory = function() {
            const input = document.getElementById('newCategoryName');
            const name = input.value.trim();
            if (name) {
                const categories = getCategories();
                categories.push({ id: Date.now().toString(), name });
                saveCategories(categories);
                input.value = '';
                renderAdminView();
            }
        };

        window.editCategory = function(id) {
            document.getElementById(`cat-text-${id}`).classList.add('hidden');
            document.getElementById(`cat-edit-${id}`).classList.remove('hidden');
            document.getElementById(`cat-edit-btn-${id}`).classList.add('hidden');
            document.getElementById(`cat-save-btn-${id}`).classList.remove('hidden');
        };

        window.saveCategoryName = function(id) {
            const newName = document.getElementById(`cat-edit-${id}`).value.trim();
            if (newName) {
                const categories = getCategories();
                const cat = categories.find(c => c.id === id);
                if (cat) cat.name = newName;
                saveCategories(categories);
                renderAdminView();
            }
        };

        window.deleteCategory = function(id) {
            if (confirm("Are you sure? Products in this category might lose their reference.")) {
                let categories = getCategories();
                categories = categories.filter(c => c.id !== id);
                saveCategories(categories);
                renderAdminView();
            }
        };

        // --- Product Logic ---
        function renderAdminProducts() {
            const tbody = document.getElementById('productAdminList');
            const products = getProducts();
            const categories = getCategories();
            tbody.innerHTML = '';

            products.forEach(p => {
                const cat = categories.find(c => c.id === p.categoryId) || { name: 'Unknown' };
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors';
                tr.innerHTML = `
                    <td class="py-3 px-4">
                        <img src="${p.imageUrl}" alt="${p.name}" class="w-12 h-12 object-cover rounded shadow-sm">
                    </td>
                    <td class="py-3 px-4">
                        <div class="font-bold text-gray-800">${p.name}</div>
                        <div class="text-xs text-neutralTextMuted">${cat.name}</div>
                    </td>
                    <td class="py-3 px-4 font-semibold text-primary">
                        LKR ${parseFloat(p.price).toFixed(2)}
                    </td>
                    <td class="py-3 px-4 text-right">
                        <button onclick="editProduct('${p.id}')" class="text-gray-400 hover:text-blue-500 transition mr-2">
                            <svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button onclick="deleteProduct('${p.id}')" class="text-gray-400 hover:text-red-500 transition">
                            <svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.toggleProductForm = function(show = null) {
            const container = document.getElementById('productFormContainer');
            const btn = document.getElementById('addProductToggleBtn');
            
            if (show === true || container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                btn.classList.add('hidden');
            } else {
                container.classList.add('hidden');
                btn.classList.remove('hidden');
                clearProductForm();
            }
        };

        function clearProductForm() {
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productCategory').selectedIndex = 0;
            document.getElementById('productImage').value = '';
            document.getElementById('productDesc').value = '';
        }

        window.saveProduct = function() {
            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const categoryId = document.getElementById('productCategory').value;
            const imageUrl = document.getElementById('productImage').value.trim() || 'https://via.placeholder.com/400x300?text=No+Image';
            const description = document.getElementById('productDesc').value.trim();

            if (!name || isNaN(price)) {
                alert("Please provide a valid name and price.");
                return;
            }

            let products = getProducts();
            
            if (id) {
                // Update
                const idx = products.findIndex(p => p.id === id);
                if (idx > -1) {
                    products[idx] = { ...products[idx], name, price, categoryId, imageUrl, description };
                }
            } else {
                // Add
                products.push({
                    id: Date.now().toString(),
                    name, price, categoryId, imageUrl, description
                });
            }

            saveProducts(products);
            toggleProductForm(false);
            renderAdminProducts();
        };

        window.editProduct = function(id) {
            const product = getProducts().find(p => p.id === id);
            if (product) {
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productCategory').value = product.categoryId;
                document.getElementById('productImage').value = product.imageUrl;
                document.getElementById('productDesc').value = product.description;
                toggleProductForm(true);
            }
        };

        window.deleteProduct = function(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                let products = getProducts();
                products = products.filter(p => p.id !== id);
                saveProducts(products);
                
                // Also remove from cart
                deleteCartItem(id);
                
                renderAdminProducts();
            }
        };
    </script>
</body>
</html>
