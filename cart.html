<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - FreshMart</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#166534',
                        secondary: '#84CC16',
                        neutralBg: '#F3F4F6',
                        neutralTextMain: '#1F2937',
                        neutralTextMuted: '#6B7280',
                        neutralCard: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutralBg text-neutralTextMain min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-primary text-white sticky top-0 z-40 shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wide">FreshMart</a>
            <div class="flex items-center space-x-4">
                <a href="cart.html" class="relative group p-2 hover:bg-blue-800 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span id="cartCount" class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-secondary rounded-full hidden shadow animate-bounce">0</span>
                </a>
                <a href="admin.html" class="text-sm border border-white px-3 py-1 rounded hover:bg-blue-800 transition">Admin</a>
                <button id="loginBtn" class="border flex items-center border-secondary text-secondary hover:bg-secondary hover:text-white transition-colors duration-300 font-semibold py-2 px-4 rounded shadow">
                    Login
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">
        <h1 class="text-3xl font-bold text-primary mb-8 border-b pb-4">Your Shopping Cart</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Cart Items -->
            <div class="lg:w-2/3">
                <div class="bg-neutralCard rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <ul id="cartItemsList" class="divide-y divide-gray-200">
                        <!-- Items Rendered Dynamically -->
                    </ul>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="lg:w-1/3">
                <div class="bg-neutralCard rounded-xl shadow-md border border-gray-100 p-6 sticky top-24">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">Order Summary</h2>
                    
                    <div class="flex justify-between items-center mb-4 text-neutralTextMuted">
                        <span>Subtotal</span>
                        <span id="summarySubtotal" class="font-medium"></span>
                    </div>
                    <div class="flex justify-between items-center mb-6 text-neutralTextMuted">
                        <span>Shipping</span>
                        <span class="font-medium text-green-600">Free</span>
                    </div>
                    
                    <div class="border-t pt-4 mb-8 flex justify-between items-center">
                        <span class="text-lg font-bold">Total</span>
                        <span id="summaryTotal" class="text-2xl font-bold text-primary"></span>
                    </div>
                    
                    <button id="checkoutBtn" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-blue-800 transition shadow-md flex justify-center items-center">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary text-white mt-auto py-6">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 FreshMart. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Specific cart page logic
        function renderCartPage() {
            const listEl = document.getElementById('cartItemsList');
            const cartItems = getCart();
            const products = getProducts();
            
            if (!listEl) return;
            
            if (cartItems.length === 0) {
                listEl.innerHTML = `
                    <li class="p-8 text-center text-neutralTextMuted">
                        <p class="mb-4">Your cart is currently empty.</p>
                        <a href="index.html" class="text-primary hover:underline font-semibold">Start shopping</a>
                    </li>`;
                
                document.getElementById('summarySubtotal').textContent = '$0.00';
                document.getElementById('summaryTotal').textContent = '$0.00';
                document.getElementById('checkoutBtn').disabled = true;
                document.getElementById('checkoutBtn').classList.add('opacity-50', 'cursor-not-allowed');
                return;
            }

            document.getElementById('checkoutBtn').disabled = false;
            document.getElementById('checkoutBtn').classList.remove('opacity-50', 'cursor-not-allowed');

            listEl.innerHTML = '';
            cartItems.forEach(item => {
                const product = products.find(p => p.id === item.productId);
                if (product) {
                    const li = document.createElement('li');
                    li.className = 'flex items-center p-6 hover:bg-gray-50 transition-colors';
                    const itemTotal = (product.price * item.quantity).toFixed(2);
                    
                    li.innerHTML = `
                        <img src="${product.imageUrl}" alt="${product.name}" class="w-20 h-20 object-cover rounded shadow-sm">
                        <div class="ml-6 flex-grow">
                            <h3 class="text-lg font-bold text-gray-800">${product.name}</h3>
                            <p class="text-sm text-neutralTextMuted">$${parseFloat(product.price).toFixed(2)}</p>
                            
                            <div class="mt-3 flex items-center space-x-4">
                                <!-- Quantity Editor -->
                                <div class="flex items-center border border-gray-300 rounded w-max">
                                    <button class="px-3 py-1 text-secondary hover:bg-gray-100 transition" onclick="updateQty('${product.id}', -1)">-</button>
                                    <span class="px-4 py-1 text-sm font-medium border-x border-gray-300">${item.quantity}</span>
                                    <button class="px-3 py-1 text-secondary hover:bg-gray-100 transition" onclick="updateQty('${product.id}', 1)">+</button>
                                </div>
                                <button class="text-red-500 hover:text-red-700 text-sm font-medium flex items-center" onclick="removeCartItem('${product.id}')">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    Remove
                                </button>
                            </div>
                        </div>
                        <div class="text-right ml-4">
                            <span class="font-bold text-gray-800 block text-lg">$${itemTotal}</span>
                        </div>
                    `;
                    listEl.appendChild(li);
                }
            });

            // Update Summary
            const total = getCartTotal().toFixed(2);
            document.getElementById('summarySubtotal').textContent = `$${total}`;
            document.getElementById('summaryTotal').textContent = `$${total}`;
        }

        // Global exposing for onclick
        window.updateQty = function(id, change) {
            const cart = getCart();
            const item = cart.find(i => i.productId === id);
            if (item) {
                editCartItem(id, item.quantity + change);
                renderCartPage();
            }
        };

        window.removeCartItem = function(id) {
            deleteCartItem(id);
            renderCartPage();
        };

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (getCartCount() > 0) {
                window.location.href = 'checkout.html';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
        });
    </script>
</body>
</html>
